<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>ScoutFlow – AI Startup Intelligence Platform</title>
    <meta
      name="description"
      content="NorthStar Capital is an early-stage venture capital firm investing in AI, SaaS, and technology-driven startups across India and global markets."
    />
    <meta
      name="keywords"
      content="Venture Capital, VC Firm, Early Stage Investing, AI Startups, SaaS Investors, Seed Funding, Series A Investment"
    />
    <meta name="author" content="NorthStar Capital" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.northstarcapital.com/" />

    <!-- Open Graph (LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NorthStar Capital | Early-Stage Venture Capital Firm" />
    <meta
      property="og:description"
      content="Investing in bold founders building AI, SaaS, and next-generation technology companies."
    />
    <meta property="og:url" content="https://www.northstarcapital.com/" />
    <meta property="og:site_name" content="NorthStar Capital" />
    <meta property="og:image" content="https://www.northstarcapital.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NorthStar Capital | Venture Capital Firm" />
    <meta
      name="twitter:description"
      content="Backing ambitious founders building the future of AI and technology."
    />
    <meta name="twitter:image" content="https://www.northstarcapital.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#111827" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
