<!doctype html>
<html lang="en">
  <head>
    <!-- ========================================= -->
    <!-- Basic Meta -->
    <!-- ========================================= -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ========================================= -->
    <!-- Primary SEO -->
    <!-- ========================================= -->
    <title>
      Scout AI | AI Startup Intelligence & Venture Analytics Platform
    </title>

    <meta
      name="description"
      content="Scout AI is an AI-powered startup intelligence platform that helps venture capital firms and investors discover, analyze, score, and track high-growth startups using real-time signals and AI-driven insights."
    />

    <meta
      name="keywords"
      content="AI Startup Intelligence, Venture Capital Software, Startup Scoring Platform, AI Investment Analytics, VC Deal Flow Management, Startup Discovery Tool, AI Due Diligence Software"
    />

    <meta name="author" content="Scout AI" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Canonical URL (Replace with production domain) -->
    <link rel="canonical" href="https://www.scoutai.io/" />

    <!-- ========================================= -->
    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <!-- ========================================= -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Scout AI | AI-Powered Startup Intelligence Platform"
    />
    <meta
      property="og:description"
      content="Discover, enrich, and score startups using AI. Scout AI provides venture intelligence, automated signal detection, and portfolio tracking for modern investors."
    />
    <meta property="og:url" content="https://www.scoutai.io/" />
    <meta property="og:site_name" content="Scout AI" />
    <meta
      property="og:image"
      content="https://www.scoutai.io/og-image.jpg"
    />

    <!-- ========================================= -->
    <!-- Twitter Card -->
    <!-- ========================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Scout AI | Startup Intelligence & VC Analytics"
    />
    <meta
      name="twitter:description"
      content="AI-powered startup discovery and scoring platform for venture capital firms and investors."
    />
    <meta
      name="twitter:image"
      content="https://www.scoutai.io/og-image.jpg"
    />

    <!-- ========================================= -->
    <!-- Performance & Optimization -->
    <!-- ========================================= -->
    <meta name="theme-color" content="#111827" />
    <link rel="icon" type="image/png" href="./public/favicon.ico" />

    <!-- Preconnect for Faster Font Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ========================================= -->
    <!-- Structured Data (JSON-LD for Google) -->
    <!-- ========================================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Scout AI",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "AI-powered startup intelligence and venture analytics platform for investors and VC firms.",
        "url": "https://www.scoutai.io/",
        "creator": {
          "@type": "Organization",
          "name": "Scout AI"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
